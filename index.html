<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JomerStream 🎌</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080c14;--surface:#0f1620;--card:#141e2e;--accent:#e63946;--accent2:#457b9d;--text:#e8eaf0;--muted:#6b7a99;--border:#1e2d45;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
    nav{display:flex;align-items:center;padding:14px 18px;background:rgba(8,12,20,0.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);gap:10px;flex-wrap:wrap;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px rgba(230,57,70,0.4);cursor:pointer;flex-shrink:0;}
    .logo span{color:var(--text);}
    .search-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:180px;}
    #search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
    #search-input:focus{border-color:var(--accent);}
    #search-input::placeholder{color:var(--muted);}
    #search-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
    .page{display:none;padding:18px;}
    .page.active{display:block;}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;color:var(--muted);margin-bottom:14px;border-left:3px solid var(--accent);padding-left:10px;}
    .anime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:38px;}
    .anime-card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;}
    .anime-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 24px rgba(230,57,70,0.18);}
    .anime-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface);}
    .anime-card-info{padding:8px 10px;}
    .anime-card-title{font-size:12px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .anime-card-sub{font-size:11px;color:var(--muted);margin-top:3px;}
    .anime-card-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:5px;}
    .results-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
    .back-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;}
    .detail-hero{display:flex;gap:18px;margin-bottom:24px;}
    .detail-poster{width:150px;min-width:150px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .detail-poster img{width:100%;display:block;background:var(--surface);}
    .detail-info{flex:1;}
    .detail-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1.1;margin-bottom:8px;}
    .detail-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
    .meta-tag{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:20px;}
    .meta-tag.hi{background:rgba(230,57,70,0.15);border-color:var(--accent);color:var(--accent);}
    .detail-synopsis{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
    .detail-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .watch-now-btn{background:var(--accent);color:#fff;border:none;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
    .lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .lang-btn{background:none;border:none;color:var(--muted);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .lang-btn.active{background:var(--accent2);color:#fff;}
    .ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(62px,1fr));gap:7px;margin-top:12px;max-height:250px;overflow-y:auto;padding-right:4px;}
    .ep-grid::-webkit-scrollbar{width:4px;}
    .ep-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .ep-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 4px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
    .ep-btn:hover,.ep-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .player-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .player-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .player-title span{color:var(--accent);}
    .player-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .player-wrap iframe{width:100%;height:100%;border:none;}
    .server-row{display:flex;gap:7px;margin:12px 0 0;flex-wrap:wrap;align-items:center;}
    .srv-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .srv-btn.active{border-color:var(--accent);color:var(--accent);}
    .lang-switch{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-left:auto;}
    .lang-switch-btn{background:none;border:none;color:var(--muted);padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;}
    .lang-switch-btn.active{background:var(--accent2);color:#fff;}
    .ep-nav{display:flex;gap:8px;margin:12px 0 0;justify-content:space-between;align-items:center;}
    .ep-nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 15px;border-radius:8px;cursor:pointer;font-size:13px;}
    .ep-nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .ep-indicator{font-size:13px;color:var(--muted);}
    .tip-box{background:rgba(69,123,157,0.08);border:1px solid var(--accent2);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--muted);margin:11px 0 0;line-height:1.6;}
    .tip-box strong{color:var(--text);}
    .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
    .empty-state h3{font-size:18px;margin-bottom:6px;color:var(--text);}
    .empty-state p{font-size:13px;}
    @media(max-width:480px){.detail-hero{flex-direction:column;}.detail-poster{width:120px;}.detail-title{font-size:24px;}}
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="goHome()">JOMER<span>STREAM</span></div>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search anime..."/>
    <button id="search-btn">Search</button>
  </div>
</nav>

<!-- HOME -->
<div id="home-page" class="page active">
  <div class="section-title">🔥 TRENDING NOW</div>
  <div class="anime-grid" id="trending-grid"></div>
  <div class="section-title">⭐ TOP RATED ALL TIME</div>
  <div class="anime-grid" id="toprated-grid"></div>
</div>

<!-- SEARCH -->
<div id="search-results-page" class="page">
  <div class="results-header">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="section-title" style="margin:0" id="results-title">Results</div>
  </div>
  <div class="anime-grid" id="results-grid"></div>
</div>

<!-- DETAIL -->
<div id="detail-page" class="page">
  <div class="detail-hero">
    <div class="detail-poster"><img id="detail-img" src="" alt=""/></div>
    <div class="detail-info">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="detail-synopsis" id="detail-synopsis"></div>
      <div class="detail-actions">
        <button class="watch-now-btn" id="watch-ep1-btn">▶ Watch Episode 1</button>
        <div class="lang-toggle">
          <button class="lang-btn active" id="detail-sub-btn" onclick="setLang('sub')">SUB</button>
          <button class="lang-btn" id="detail-dub-btn" onclick="setLang('dub')">DUB</button>
        </div>
      </div>
    </div>
  </div>
  <div class="section-title" id="ep-label">EPISODES</div>
  <div class="ep-grid" id="ep-grid"></div>
</div>

<!-- PLAYER -->
<div id="player-page" class="page">
  <div class="player-header">
    <button class="back-btn" id="back-detail">← Back</button>
    <div class="player-title" id="player-title">Loading...</div>
  </div>
  <div class="player-wrap">
    <iframe id="player-iframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" frameborder="0" scrolling="no"></iframe>
  </div>
  <div class="server-row">
    <button class="srv-btn active" onclick="setServer(0)" id="srv0">🎯 MegaPlay</button>
    <button class="srv-btn" onclick="setServer(1)" id="srv1">Server 2</button>
    <button class="srv-btn" onclick="setServer(2)" id="srv2">Server 3</button>
    <button class="srv-btn" onclick="setServer(3)" id="srv3">Server 4</button>
    <div class="lang-switch">
      <button class="lang-switch-btn active" id="psub" onclick="switchLang('sub')">SUB</button>
      <button class="lang-switch-btn" id="pdub" onclick="switchLang('dub')">DUB</button>
    </div>
  </div>
  <div class="tip-box">
    💡 <strong>MegaPlay</strong> is the default — best quality, HiAnime library. If it doesn't load, try Server 2–4. Toggle SUB/DUB anytime.
  </div>
  <div class="ep-nav">
    <button class="ep-nav-btn" id="prev-ep">← Prev</button>
    <div class="ep-indicator" id="ep-indicator"></div>
    <button class="ep-nav-btn" id="next-ep">Next →</button>
  </div>
</div>

let currentAnime=null, currentEp=1, totalEps=1, currentLang='sub', currentServer=0;

// ── SERVERS ──
// Server 0 = MegaPlay (primary, works now that we have a real domain)
// Servers 1-3 = fallbacks
const SERVERS = [
  {
    name:'🎯 MegaPlay',
    url:(a,ep,lang)=>`https://megaplay.buzz/stream/mal/${a.mal_id}/${ep}/${lang}`
  },
  {
    name:'Server 2',
    url:(a,ep,lang)=>a.imdb?`https://vidsrc.me/embed/tv?imdb=${a.imdb}&season=1&episode=${ep}`:`https://vidsrc.me/embed/tv?tmdb=${a.tmdb}&season=1&episode=${ep}`
  },
  {
    name:'Server 3',
    url:(a,ep,lang)=>`https://vidsrc.icu/embed/tv/${a.tmdb}/1/${ep}`
  },
  {
    name:'Server 4',
    url:(a,ep,lang)=>`https://vidlink.pro/tv/${a.tmdb}/1/${ep}?sub_type=${lang}`
  }
];

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goHome(){document.getElementById('search-input').value='';showPage('home-page');}
function setLang(lang){currentLang=lang;document.getElementById('detail-sub-btn').classList.toggle('active',lang==='sub');document.getElementById('detail-dub-btn').classList.toggle('active',lang==='dub');}
function switchLang(lang){currentLang=lang;document.getElementById('psub').classList.toggle('active',lang==='sub');document.getElementById('pdub').classList.toggle('active',lang==='dub');loadIframe();}
function setServer(idx){currentServer=idx;[0,1,2,3].forEach(i=>document.getElementById('srv'+i).classList.toggle('active',i===idx));loadIframe();}
function loadIframe(){document.getElementById('player-iframe').src=SERVERS[currentServer].url(currentAnime,currentEp,currentLang);}

function buildCard(a){
  const c=document.createElement('div');c.className='anime-card';
  c.innerHTML=`<img src="${a.img}" alt="${a.title}" loading="lazy"/>
    <div class="anime-card-info">
      <div class="anime-card-title">${a.title}</div>
      <div class="anime-card-sub">${a.episodes?a.episodes+' eps':'Ongoing'}</div>
      ${a.score?`<div class="anime-card-badge">⭐ ${a.score}</div>`:''}
    </div>`;
  c.onclick=()=>openDetail(a);return c;
}
function renderGrid(id,list){
  const g=document.getElementById(id);g.innerHTML='';
  if(!list?.length){g.innerHTML=`<div class="empty-state"><h3>Nothing found</h3></div>`;return;}
  list.forEach(a=>g.appendChild(buildCard(a)));
}

const TRENDING=[52991,21,40748,38000,47778,16498,39535,37779,269,11757,1735,20,50739,54112];
const TOPRATED=[5114,9253,11061,1535,30276,32281,199,44511,33486,22319,37779,52991,23273,50739];

function loadHome(){
  renderGrid('trending-grid',TRENDING.map(id=>LIBRARY.find(a=>a.mal_id===id)).filter(Boolean));
  renderGrid('toprated-grid',TOPRATED.map(id=>LIBRARY.find(a=>a.mal_id===id)).filter(Boolean));
}

function doSearch(){
  const q=document.getElementById('search-input').value.trim().toLowerCase();
  if(!q)return;
  showPage('search-results-page');
  document.getElementById('results-title').textContent=`Results for "${q}"`;
  const matches=LIBRARY.filter(a=>a.title.toLowerCase().includes(q));
  const g=document.getElementById('results-grid');g.innerHTML='';
  if(!matches.length){g.innerHTML=`<div class="empty-state"><h3>Not in library</h3><p>Try: One Piece · Naruto · Bleach · Slime · AOT · FMA · Death Note · Jujutsu Kaisen</p></div>`;return;}
  matches.forEach(a=>g.appendChild(buildCard(a)));
}
document.getElementById('search-btn').onclick=doSearch;
document.getElementById('search-input').onkeydown=e=>{if(e.key==='Enter')doSearch();};

function openDetail(a){
  currentAnime=a;showPage('detail-page');
  document.getElementById('detail-img').src=a.img;
  document.getElementById('detail-title').textContent=a.title;
  document.getElementById('detail-synopsis').textContent=a.synopsis||'No synopsis.';
  const tags=[
    {label:a.type||'TV',hi:false},{label:a.status||'',hi:a.status==='Currently Airing'},
    {label:a.year?String(a.year):'',hi:false},{label:a.score?`⭐ ${a.score}`:'',hi:true},
    {label:a.episodes?`${a.episodes} Episodes`:'Ongoing',hi:false},
  ].filter(t=>t.label);
  document.getElementById('detail-meta').innerHTML=tags.map(t=>`<span class="meta-tag ${t.hi?'hi':''}">${t.label}</span>`).join('');
  setLang('sub');
  totalEps=a.episodes||100;
  const eg=document.getElementById('ep-grid');eg.innerHTML='';
  const max=Math.min(totalEps,500);
  for(let i=1;i<=max;i++){
    const b=document.createElement('button');b.className='ep-btn';b.textContent=`EP ${i}`;
    b.onclick=()=>openPlayer(i);eg.appendChild(b);
  }
  document.getElementById('ep-label').textContent=a.episodes?'EPISODES':'EPISODES (Ongoing)';
  document.getElementById('watch-ep1-btn').onclick=()=>openPlayer(1);
}

function openPlayer(ep){
  currentEp=ep;currentServer=0;
  showPage('player-page');
  document.getElementById('player-title').innerHTML=`${currentAnime.title} <span>— EP ${ep}</span>`;
  [0,1,2,3].forEach(i=>document.getElementById('srv'+i).classList.toggle('active',i===0));
  document.getElementById('psub').classList.toggle('active',currentLang==='sub');
  document.getElementById('pdub').classList.toggle('active',currentLang==='dub');
  loadIframe();
  updateEpNav();
  document.querySelectorAll('.ep-btn').forEach((b,i)=>b.classList.toggle('active',i+1===ep));
}

function updateEpNav(){
  document.getElementById('ep-indicator').textContent=`Episode ${currentEp}`;
  document.getElementById('prev-ep').disabled=currentEp<=1;
  document.getElementById('next-ep').disabled=currentEp>=totalEps;
}
document.getElementById('prev-ep').onclick=()=>{if(currentEp>1)openPlayer(currentEp-1);};
document.getElementById('next-ep').onclick=()=>{if(currentEp<totalEps)openPlayer(currentEp+1);};
document.getElementById('back-detail').onclick=()=>{document.getElementById('player-iframe').src='';showPage('detail-page');};

loadHome();
</script>
</body>
</html>
