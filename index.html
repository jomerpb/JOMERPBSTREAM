<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JomerPB Personal Streaming 🎌</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080c14;--surface:#0f1620;--card:#141e2e;--accent:#e63946;--accent2:#457b9d;--text:#e8eaf0;--muted:#6b7a99;--border:#1e2d45;--skeleton:#1a2535;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

    /* NAV */
    nav{display:flex;flex-direction:column;align-items:flex-start;padding:12px 16px 14px;background:rgba(8,12,20,0.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);gap:10px;}
    .logo-wrap{display:flex;flex-direction:column;gap:1px;cursor:pointer;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px rgba(230,57,70,0.4);line-height:1;}
    .logo span{color:var(--text);}
    .logo-sub{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:var(--muted);line-height:1;}
    .search-wrap{display:flex;align-items:center;gap:8px;width:100%;}
    #search-input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
    #search-input:focus{border-color:var(--accent);}
    #search-input::placeholder{color:var(--muted);}
    #search-btn{flex-shrink:0;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;}

    /* PAGES */
    .page{display:none;padding:16px;}
    .page.active{display:block;}

    /* SECTION TITLE */
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;border-left:3px solid var(--accent);padding-left:10px;}

    /* GRID */
    .anime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:32px;}

    /* SKELETON CARDS */
    .skeleton-card{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .skeleton-img{width:100%;aspect-ratio:2/3;background:var(--skeleton);animation:shimmer 1.4s infinite;}
    .skeleton-line{height:10px;border-radius:4px;background:var(--skeleton);animation:shimmer 1.4s infinite;margin:8px 9px 4px;}
    .skeleton-line.short{width:60%;margin-top:4px;}
    @keyframes shimmer{0%{opacity:0.5}50%{opacity:1}100%{opacity:0.5}}

    /* REAL CARDS */
    .anime-card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;}
    .anime-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 24px rgba(230,57,70,0.18);}
    .anime-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface);}
    .anime-card-info{padding:8px 9px;}
    .anime-card-title{font-size:11px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .anime-card-sub{font-size:10px;color:var(--muted);margin-top:2px;}
    .anime-card-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px;}

    /* BACK / HEADER */
    .back-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;flex-shrink:0;}
    .results-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}

    /* DETAIL HERO */
    .detail-hero{display:flex;gap:16px;margin-bottom:20px;}
    .detail-poster{width:130px;min-width:130px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .detail-poster img{width:100%;display:block;background:var(--surface);}

    /* SKELETON HERO */
    .skeleton-poster{width:130px;min-width:130px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .skeleton-poster-img{width:100%;aspect-ratio:2/3;background:var(--skeleton);animation:shimmer 1.4s infinite;}
    .skeleton-info{flex:1;}
    .skeleton-title{height:22px;border-radius:4px;background:var(--skeleton);animation:shimmer 1.4s infinite;margin-bottom:10px;width:70%;}
    .skeleton-meta{display:flex;gap:6px;margin-bottom:12px;}
    .skeleton-tag{height:18px;width:60px;border-radius:20px;background:var(--skeleton);animation:shimmer 1.4s infinite;}
    .skeleton-text{height:10px;border-radius:4px;background:var(--skeleton);animation:shimmer 1.4s infinite;margin-bottom:6px;}
    .skeleton-text.w90{width:90%;}
    .skeleton-text.w80{width:80%;}
    .skeleton-text.w70{width:70%;}

    .detail-info{flex:1;min-width:0;}
    .detail-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1.15;margin-bottom:8px;}
    .detail-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
    .meta-tag{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:10px;padding:3px 8px;border-radius:20px;}
    .meta-tag.hi{background:rgba(230,57,70,0.15);border-color:var(--accent);color:var(--accent);}
    .detail-synopsis{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
    .detail-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .watch-now-btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
    .lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .lang-btn{background:none;border:none;color:var(--muted);padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .lang-btn.active{background:var(--accent2);color:#fff;}

    /* SEASONS */
    .seasons-wrap{margin-bottom:16px;}
    .seasons-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;min-height:36px;}
    .season-tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .season-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .skeleton-season-tab{width:100px;height:34px;border-radius:8px;background:var(--skeleton);animation:shimmer 1.4s infinite;display:inline-block;}

    /* EPISODES */
    .ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px;max-height:240px;overflow-y:auto;padding-right:4px;}
    .ep-grid::-webkit-scrollbar{width:4px;}
    .ep-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .ep-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 4px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:background 0.15s;}
    .ep-btn:hover,.ep-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
    .skeleton-ep{height:34px;border-radius:6px;background:var(--skeleton);animation:shimmer 1.4s infinite;}

    /* PLAYER */
    .player-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .player-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .player-title span{color:var(--accent);}
    .player-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .player-wrap iframe{width:100%;height:100%;border:none;}
    .player-controls{display:flex;align-items:center;justify-content:space-between;margin:10px 0 0;flex-wrap:wrap;gap:8px;}
    .powered-by{font-size:11px;color:var(--muted);}
    .powered-by span{color:var(--accent2);font-weight:600;}
    .lang-switch{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .lang-switch-btn{background:none;border:none;color:var(--muted);padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;}
    .lang-switch-btn.active{background:var(--accent2);color:#fff;}
    .ep-nav{display:flex;gap:8px;margin:10px 0 0;justify-content:space-between;align-items:center;}
    .ep-nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;}
    .ep-nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .ep-indicator{font-size:12px;color:var(--muted);text-align:center;}

    /* EMPTY */
    .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
    .empty-state h3{font-size:17px;margin-bottom:6px;color:var(--text);}
    .empty-state p{font-size:12px;line-height:1.6;}

    @media(max-width:400px){
      .detail-hero{flex-direction:column;}
      .detail-poster,.skeleton-poster{width:110px;}
      .detail-title{font-size:19px;}
    }
  </style>
</head>
<body>

<nav>
  <div class="logo-wrap" onclick="goHome()">
    <div class="logo">JOMERPB <span>PERSONAL STREAMING</span></div>
    <div class="logo-sub">🎌 Your Private Anime Library</div>
  </div>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search any anime..."/>
    <button id="search-btn">Search</button>
  </div>
</nav>

<!-- HOME -->
<div id="home-page" class="page active">
  <div class="section-title">🆕 NEW THIS SEASON</div>
  <div class="anime-grid" id="new-grid"></div>
  <div class="section-title">🔥 TRENDING NOW</div>
  <div class="anime-grid" id="trending-grid"></div>
  <div class="section-title">⭐ TOP RATED ALL TIME</div>
  <div class="anime-grid" id="toprated-grid"></div>
</div>

<!-- SEARCH RESULTS -->
<div id="search-results-page" class="page">
  <div class="results-header">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="section-title" style="margin:0" id="results-title">Results</div>
  </div>
  <div class="anime-grid" id="results-grid"></div>
</div>

<!-- DETAIL -->
<div id="detail-page" class="page">
  <div style="margin-bottom:12px;">
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
  <div id="detail-hero-wrap"></div>
  <div class="seasons-wrap">
    <div class="section-title">SEASONS & EPISODES</div>
    <div class="seasons-tabs" id="seasons-tabs"></div>
    <div class="ep-grid" id="ep-grid"></div>
  </div>
</div>

<!-- PLAYER -->
<div id="player-page" class="page">
  <div class="player-header">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="player-title" id="player-title">Loading...</div>
  </div>
  <div class="player-wrap">
    <iframe id="player-iframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture" frameborder="0" scrolling="no"></iframe>
  </div>
  <div class="player-controls">
    <div class="powered-by">Powered by <span>MegaPlay</span></div>
    <div class="lang-switch">
      <button class="lang-switch-btn active" id="psub" onclick="switchLang('sub')">SUB</button>
      <button class="lang-switch-btn" id="pdub" onclick="switchLang('dub')">DUB</button>
    </div>
  </div>
  <div class="ep-nav">
    <button class="ep-nav-btn" id="prev-ep">← Prev</button>
    <div class="ep-indicator" id="ep-indicator"></div>
    <button class="ep-nav-btn" id="next-ep">Next →</button>
  </div>
</div>

<script>
// ── STATE ──
let currentAnime  = null;
let currentSeason = null;
let allSeasons    = [];
let currentEp     = 1;
let totalEps      = 1;
let currentLang   = 'sub';
let pageStack     = ['home-page'];

// ── CACHE — prevents re-fetching same anime ──
const seasonCache = {};

const JIKAN = 'https://api.jikan.moe/v4';

// ── STREAM URL ──
const streamUrl = (malId, ep, lang) =>
  `https://megaplay.buzz/stream/mal/${malId}/${ep}/${lang}`;

// ── PAGE NAV ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goHome() {
  document.getElementById('search-input').value = '';
  pageStack = ['home-page'];
  showPage('home-page');
}
function goBack() {
  if (pageStack.length > 1) pageStack.pop();
  showPage(pageStack[pageStack.length - 1] || 'home-page');
}
function navigateTo(id) {
  if (pageStack[pageStack.length - 1] !== id) pageStack.push(id);
  showPage(id);
}

// ── LANG ──
function setLang(lang) {
  currentLang = lang;
  document.getElementById('detail-sub-btn')?.classList.toggle('active', lang === 'sub');
  document.getElementById('detail-dub-btn')?.classList.toggle('active', lang === 'dub');
}
function switchLang(lang) {
  currentLang = lang;
  document.getElementById('psub').classList.toggle('active', lang === 'sub');
  document.getElementById('pdub').classList.toggle('active', lang === 'dub');
  document.getElementById('player-iframe').src = streamUrl(currentSeason.mal_id, currentEp, lang);
}

// ── API (with timeout) ──
async function fetchJSON(url) {
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

// ── SKELETON HELPERS ──
function skeletonCards(n) {
  return Array(n).fill(0).map(() => `
    <div class="skeleton-card">
      <div class="skeleton-img"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    </div>`).join('');
}
function skeletonHero() {
  return `
    <div class="detail-hero">
      <div class="skeleton-poster"><div class="skeleton-poster-img"></div></div>
      <div class="skeleton-info">
        <div class="skeleton-title"></div>
        <div class="skeleton-meta">
          <div class="skeleton-tag"></div><div class="skeleton-tag"></div><div class="skeleton-tag"></div>
        </div>
        <div class="skeleton-text w90"></div>
        <div class="skeleton-text w80"></div>
        <div class="skeleton-text w70"></div>
      </div>
    </div>`;
}
function skeletonEpisodes(n=12) {
  return Array(n).fill(0).map(() => `<div class="skeleton-ep"></div>`).join('');
}

// ── CARD BUILDER ──
function buildCard(a) {
  const card = document.createElement('div');
  card.className = 'anime-card';
  const img = a.images?.jpg?.image_url || '';
  card.innerHTML = `
    <img src="${img}" alt="${a.title}" loading="lazy"/>
    <div class="anime-card-info">
      <div class="anime-card-title">${a.title}</div>
      <div class="anime-card-sub">${a.episodes ? a.episodes + ' eps' : 'Ongoing'}</div>
      ${a.score ? `<div class="anime-card-badge">⭐ ${a.score}</div>` : ''}
    </div>`;
  card.onclick = () => openDetail(a);
  return card;
}

function renderGrid(id, list) {
  const g = document.getElementById(id);
  g.innerHTML = '';
  if (!list?.length) {
    g.innerHTML = `<div class="empty-state"><h3>Nothing found</h3></div>`;
    return;
  }
  list.forEach(a => g.appendChild(buildCard(a)));
}

// ── HOME — skeletons first, then real data ──
async function loadHome() {
  // Show skeletons immediately
  document.getElementById('new-grid').innerHTML      = skeletonCards(6);
  document.getElementById('trending-grid').innerHTML = skeletonCards(6);
  document.getElementById('toprated-grid').innerHTML = skeletonCards(6);

  // Fetch all 3 in parallel
  const [seasonal, trending, toprated] = await Promise.all([
    fetchJSON(`${JIKAN}/seasons/now?limit=12`),
    fetchJSON(`${JIKAN}/top/anime?filter=airing&limit=12`),
    fetchJSON(`${JIKAN}/top/anime?limit=12`)
  ]);

  // Replace skeletons with real cards as each arrives
  renderGrid('new-grid',      seasonal?.data || []);
  renderGrid('trending-grid', trending?.data  || []);
  renderGrid('toprated-grid', toprated?.data  || []);
}

// ── SEARCH — skeleton while searching ──
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  navigateTo('search-results-page');
  document.getElementById('results-title').textContent = `Results for "${q}"`;
  document.getElementById('results-grid').innerHTML = skeletonCards(8);
  const data = await fetchJSON(`${JIKAN}/anime?q=${encodeURIComponent(q)}&limit=24&sfw=true`);
  renderGrid('results-grid', data?.data);
}

document.getElementById('search-btn').onclick = doSearch;
document.getElementById('search-input').onkeydown = e => { if (e.key === 'Enter') doSearch(); };

// ── FETCH ALL SEASONS (cached, parallel where possible) ──
async function fetchAllSeasons(rootId) {
  if (seasonCache[rootId]) return seasonCache[rootId];

  const visited = new Set();
  const seasons = [];

  // Fetch a single anime's info + relations in parallel
  async function fetchAnimeData(malId) {
    const [info, relations] = await Promise.all([
      fetchJSON(`${JIKAN}/anime/${malId}`),
      fetchJSON(`${JIKAN}/anime/${malId}/relations`)
    ]);
    return { info: info?.data, relations: relations?.data };
  }

  async function walk(malId) {
    if (visited.has(malId)) return;
    visited.add(malId);

    const { info, relations } = await fetchAnimeData(malId);
    if (!info) return;

    if (['TV','OVA','ONA','Special'].includes(info.type)) {
      seasons.push({
        mal_id:   info.mal_id,
        title:    info.title,
        title_en: info.title_english || info.title,
        episodes: info.episodes || 0,
        status:   info.status,
        year:     info.year,
        score:    info.score,
        img:      info.images?.jpg?.large_image_url || info.images?.jpg?.image_url || '',
        synopsis: info.synopsis || ''
      });
    }

    if (relations) {
      // Collect all sequel/prequel IDs first
      const nextIds = [];
      for (const rel of relations) {
        if (['Sequel','Prequel','Alternative version'].includes(rel.relation)) {
          for (const entry of rel.entry) {
            if (entry.type === 'anime' && !visited.has(entry.mal_id)) {
              nextIds.push(entry.mal_id);
            }
          }
        }
      }
      // Walk sequentially with small delay to respect rate limit
      for (const id of nextIds) {
        await new Promise(r => setTimeout(r, 300));
        await walk(id);
      }
    }
  }

  await walk(rootId);
  seasons.sort((a, b) => (a.year || 9999) - (b.year || 9999) || a.mal_id - b.mal_id);

  // Cache result
  seasonCache[rootId] = seasons;
  return seasons;
}

// ── OPEN DETAIL — instant skeleton, load in background ──
async function openDetail(a) {
  currentAnime = a;
  allSeasons   = [];
  currentLang  = 'sub';
  navigateTo('detail-page');

  // Show skeleton hero immediately
  document.getElementById('detail-hero-wrap').innerHTML = skeletonHero();
  document.getElementById('seasons-tabs').innerHTML =
    `<div class="skeleton-season-tab"></div><div class="skeleton-season-tab"></div>`;
  document.getElementById('ep-grid').innerHTML = skeletonEpisodes(24);

  // Fetch full info + seasons in parallel
  const [fullInfo, seasons] = await Promise.all([
    fetchJSON(`${JIKAN}/anime/${a.mal_id}`),
    fetchAllSeasons(a.mal_id)
  ]);

  const anime = fullInfo?.data || a;
  allSeasons = seasons.length ? seasons : [{
    mal_id:   anime.mal_id,
    title:    anime.title,
    title_en: anime.title_english || anime.title,
    episodes: anime.episodes || 0,
    status:   anime.status,
    year:     anime.year,
    score:    anime.score,
    img:      anime.images?.jpg?.large_image_url || anime.images?.jpg?.image_url || '',
    synopsis: anime.synopsis || ''
  }];

  // Render real hero
  renderDetailHero(anime);
  renderSeasonTabs();
  selectSeason(allSeasons[0]);
}

function renderDetailHero(a) {
  const img = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
  const tags = [
    { label: a.type || 'TV',    hi: false },
    { label: a.status || '',    hi: a.status === 'Currently Airing' },
    { label: a.year ? String(a.year) : '', hi: false },
    { label: a.score ? `⭐ ${a.score}` : '', hi: true },
  ].filter(t => t.label);

  document.getElementById('detail-hero-wrap').innerHTML = `
    <div class="detail-hero">
      <div class="detail-poster"><img src="${img}" alt="${a.title}"/></div>
      <div class="detail-info">
        <div class="detail-title">${a.title}</div>
        <div class="detail-meta">
          ${tags.map(t => `<span class="meta-tag ${t.hi ? 'hi' : ''}">${t.label}</span>`).join('')}
        </div>
        <div class="detail-synopsis">${a.synopsis || 'No synopsis available.'}</div>
        <div class="detail-actions">
          <button class="watch-now-btn" id="watch-ep1-btn">▶ Watch EP 1</button>
          <div class="lang-toggle">
            <button class="lang-btn active" id="detail-sub-btn" onclick="setLang('sub')">SUB</button>
            <button class="lang-btn" id="detail-dub-btn" onclick="setLang('dub')">DUB</button>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('watch-ep1-btn').onclick = () => openPlayer(1);
}

function renderSeasonTabs() {
  const tabs = document.getElementById('seasons-tabs');
  tabs.innerHTML = '';
  allSeasons.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'season-tab';
    btn.textContent = allSeasons.length === 1
      ? (s.title_en || s.title)
      : `Season ${i + 1}${s.year ? ` (${s.year})` : ''}`;
    btn.title    = s.title;
    btn.dataset.malId = s.mal_id;
    btn.onclick  = () => selectSeason(s);
    tabs.appendChild(btn);
  });
}

function selectSeason(s) {
  currentSeason = s;
  totalEps = s.episodes || 100;

  document.querySelectorAll('.season-tab').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.malId) === s.mal_id));

  // Update detail title/meta for selected season
  const titleEl = document.querySelector('.detail-title');
  if (titleEl) titleEl.textContent = s.title;

  const metaEl = document.querySelector('.detail-meta');
  if (metaEl) {
    const tags = [
      { label: 'TV',    hi: false },
      { label: s.status || '', hi: s.status === 'Currently Airing' },
      { label: s.year ? String(s.year) : '', hi: false },
      { label: s.score ? `⭐ ${s.score}` : '', hi: true },
      { label: s.episodes ? `${s.episodes} Episodes` : 'Ongoing', hi: false },
    ].filter(t => t.label);
    metaEl.innerHTML = tags.map(t =>
      `<span class="meta-tag ${t.hi ? 'hi' : ''}">${t.label}</span>`).join('');
  }

  // Rebuild episode buttons
  const eg = document.getElementById('ep-grid');
  eg.innerHTML = '';
  const max = Math.min(totalEps || 100, 500);
  for (let i = 1; i <= max; i++) {
    const b = document.createElement('button');
    b.className  = 'ep-btn';
    b.textContent = `EP ${i}`;
    b.onclick    = () => openPlayer(i);
    eg.appendChild(b);
  }

  if (document.getElementById('watch-ep1-btn')) {
    document.getElementById('watch-ep1-btn').onclick = () => openPlayer(1);
  }
}

// ── PLAYER ──
function openPlayer(ep) {
  currentEp = ep;
  navigateTo('player-page');

  const sIdx = allSeasons.indexOf(currentSeason);
  const sLabel = allSeasons.length > 1 ? `S${sIdx + 1} ` : '';

  document.getElementById('player-title').innerHTML =
    `${currentAnime.title} <span>— ${sLabel}EP ${ep}</span>`;
  document.getElementById('psub').classList.toggle('active', currentLang === 'sub');
  document.getElementById('pdub').classList.toggle('active', currentLang === 'dub');
  document.getElementById('player-iframe').src = streamUrl(currentSeason.mal_id, ep, currentLang);

  updateEpNav();
  document.querySelectorAll('.ep-btn').forEach((b, i) =>
    b.classList.toggle('active', i + 1 === ep));
}

function updateEpNav() {
  const sIdx = allSeasons.indexOf(currentSeason);
  const sLabel = allSeasons.length > 1 ? `S${sIdx + 1} · ` : '';
  document.getElementById('ep-indicator').textContent =
    `${sLabel}Episode ${currentEp} / ${totalEps || '?'}`;
  document.getElementById('prev-ep').disabled = currentEp <= 1;
  document.getElementById('next-ep').disabled = currentEp >= totalEps;
}

document.getElementById('prev-ep').onclick = () => { if (currentEp > 1) openPlayer(currentEp - 1); };
document.getElementById('next-ep').onclick = () => { if (currentEp < totalEps) openPlayer(currentEp + 1); };

// ── INIT ──
loadHome();
</script>
</body>
