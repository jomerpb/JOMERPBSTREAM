<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JomerStream 🎌</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#080c14;--surface:#0f1620;--card:#141e2e;--accent:#e63946;--accent2:#457b9d;--text:#e8eaf0;--muted:#6b7a99;--border:#1e2d45;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

    /* NAV */
    nav{display:flex;align-items:center;padding:12px 16px;background:rgba(8,12,20,0.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);gap:12px;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px rgba(230,57,70,0.4);cursor:pointer;flex-shrink:0;white-space:nowrap;}
    .logo span{color:var(--text);}
    .search-wrap{display:flex;align-items:center;gap:8px;flex:1;}
    #search-input{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
    #search-input:focus{border-color:var(--accent);}
    #search-input::placeholder{color:var(--muted);}
    #search-btn{flex-shrink:0;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;}

    /* PAGES */
    .page{display:none;padding:16px;}
    .page.active{display:block;}

    /* SECTION TITLE */
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;border-left:3px solid var(--accent);padding-left:10px;}

    /* GRID */
    .anime-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:32px;}
    .anime-card{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;}
    .anime-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 8px 24px rgba(230,57,70,0.18);}
    .anime-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--surface);}
    .anime-card-info{padding:8px 9px;}
    .anime-card-title{font-size:11px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .anime-card-sub{font-size:10px;color:var(--muted);margin-top:2px;}
    .anime-card-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px;}

    /* BACK */
    .back-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;flex-shrink:0;}
    .results-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}

    /* DETAIL */
    .detail-hero{display:flex;gap:16px;margin-bottom:20px;}
    .detail-poster{width:130px;min-width:130px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .detail-poster img{width:100%;display:block;background:var(--surface);}
    .detail-info{flex:1;min-width:0;}
    .detail-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1.15;margin-bottom:8px;}
    .detail-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
    .meta-tag{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:10px;padding:3px 8px;border-radius:20px;}
    .meta-tag.hi{background:rgba(230,57,70,0.15);border-color:var(--accent);color:var(--accent);}
    .detail-synopsis{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden;}
    .detail-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .watch-now-btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
    .lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .lang-btn{background:none;border:none;color:var(--muted);padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
    .lang-btn.active{background:var(--accent2);color:#fff;}

    /* EPISODES */
    .ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:6px;margin-top:10px;max-height:240px;overflow-y:auto;padding-right:4px;}
    .ep-grid::-webkit-scrollbar{width:4px;}
    .ep-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .ep-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 4px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;}
    .ep-btn:hover,.ep-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

    /* PLAYER */
    .player-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .player-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .player-title span{color:var(--accent);}
    .player-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
    .player-wrap iframe{width:100%;height:100%;border:none;}

    /* LANG SWITCH (only control in player) */
    .player-controls{display:flex;align-items:center;justify-content:space-between;margin:10px 0 0;flex-wrap:wrap;gap:8px;}
    .powered-by{font-size:11px;color:var(--muted);}
    .powered-by span{color:var(--accent2);font-weight:600;}
    .lang-switch{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    .lang-switch-btn{background:none;border:none;color:var(--muted);padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;}
    .lang-switch-btn.active{background:var(--accent2);color:#fff;}

    /* EP NAV */
    .ep-nav{display:flex;gap:8px;margin:10px 0 0;justify-content:space-between;align-items:center;}
    .ep-nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;}
    .ep-nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .ep-indicator{font-size:12px;color:var(--muted);}

    /* LOADER */
    .loader{display:flex;justify-content:center;align-items:center;padding:50px;color:var(--muted);font-size:13px;gap:10px;}
    .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* EMPTY */
    .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
    .empty-state h3{font-size:17px;margin-bottom:6px;color:var(--text);}
    .empty-state p{font-size:12px;line-height:1.6;}

    @media(max-width:400px){
      .detail-hero{flex-direction:column;}
      .detail-poster{width:110px;}
      .detail-title{font-size:19px;}
    }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="goHome()">JOMER<span>STREAM</span></div>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search any anime..."/>
    <button id="search-btn">Search</button>
  </div>
</nav>

<!-- HOME -->
<div id="home-page" class="page active">
  <div class="section-title">🆕 NEW THIS SEASON</div>
  <div class="anime-grid" id="new-grid"><div class="loader"><div class="spinner"></div> Loading...</div></div>
  <div class="section-title">🔥 TRENDING NOW</div>
  <div class="anime-grid" id="trending-grid"><div class="loader"><div class="spinner"></div> Loading...</div></div>
  <div class="section-title">⭐ TOP RATED ALL TIME</div>
  <div class="anime-grid" id="toprated-grid"><div class="loader"><div class="spinner"></div> Loading...</div></div>
</div>

<!-- SEARCH -->
<div id="search-results-page" class="page">
  <div class="results-header">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="section-title" style="margin:0" id="results-title">Results</div>
  </div>
  <div class="anime-grid" id="results-grid"></div>
</div>

<!-- DETAIL -->
<div id="detail-page" class="page">
  <div style="margin-bottom:12px;">
    <button class="back-btn" id="back-from-detail">← Back</button>
  </div>
  <div class="detail-hero">
    <div class="detail-poster"><img id="detail-img" src="" alt=""/></div>
    <div class="detail-info">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="detail-synopsis" id="detail-synopsis"></div>
      <div class="detail-actions">
        <button class="watch-now-btn" id="watch-ep1-btn">▶ Watch EP 1</button>
        <div class="lang-toggle">
          <button class="lang-btn active" id="detail-sub-btn" onclick="setLang('sub')">SUB</button>
          <button class="lang-btn" id="detail-dub-btn" onclick="setLang('dub')">DUB</button>
        </div>
      </div>
    </div>
  </div>
  <div class="section-title" id="ep-label">EPISODES</div>
  <div class="ep-grid" id="ep-grid"></div>
</div>

<!-- PLAYER -->
<div id="player-page" class="page">
  <div class="player-header">
    <button class="back-btn" id="back-detail">← Back</button>
    <div class="player-title" id="player-title">Loading...</div>
  </div>
  <div class="player-wrap">
    <iframe id="player-iframe"
      allowfullscreen
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      frameborder="0" scrolling="no">
    </iframe>
  </div>
  <div class="player-controls">
    <div class="powered-by">Powered by <span>MegaPlay</span> · HiAnime Library</div>
    <div class="lang-switch">
      <button class="lang-switch-btn active" id="psub" onclick="switchLang('sub')">SUB</button>
      <button class="lang-switch-btn" id="pdub" onclick="switchLang('dub')">DUB</button>
    </div>
  </div>
  <div class="ep-nav">
    <button class="ep-nav-btn" id="prev-ep">← Prev</button>
    <div class="ep-indicator" id="ep-indicator"></div>
    <button class="ep-nav-btn" id="next-ep">Next →</button>
  </div>
</div>

<script>
// ── STATE ──
let currentAnime=null, currentEp=1, totalEps=1, currentLang='sub';
let prevPage='home-page';

const JIKAN = 'https://api.jikan.moe/v4';

// ── MEGAPLAY ONLY ──
function streamUrl(malId, ep, lang) {
  return `https://megaplay.buzz/stream/mal/${malId}/${ep}/${lang}`;
}

// ── PAGE NAV ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goHome() {
  document.getElementById('search-input').value = '';
  showPage('home-page');
}

// ── LANG ──
function setLang(lang) {
  currentLang = lang;
  document.getElementById('detail-sub-btn').classList.toggle('active', lang==='sub');
  document.getElementById('detail-dub-btn').classList.toggle('active', lang==='dub');
}
function switchLang(lang) {
  currentLang = lang;
  document.getElementById('psub').classList.toggle('active', lang==='sub');
  document.getElementById('pdub').classList.toggle('active', lang==='dub');
  document.getElementById('player-iframe').src = streamUrl(currentAnime.mal_id, currentEp, lang);
}

// ── API ──
async function fetchJSON(url) {
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

// ── CARD BUILDER ──
function buildCard(a) {
  const card = document.createElement('div');
  card.className = 'anime-card';
  const img = a.images?.jpg?.image_url || a.img || '';
  const eps = a.episodes ? `${a.episodes} eps` : 'Ongoing';
  const score = a.score ? `<div class="anime-card-badge">⭐ ${a.score}</div>` : '';
  card.innerHTML = `
    <img src="${img}" alt="${a.title}" loading="lazy"/>
    <div class="anime-card-info">
      <div class="anime-card-title">${a.title}</div>
      <div class="anime-card-sub">${eps}</div>
      ${score}
    </div>`;
  card.onclick = () => openDetail(a);
  return card;
}

function renderGrid(id, list) {
  const g = document.getElementById(id);
  g.innerHTML = '';
  if (!list?.length) {
    g.innerHTML = `<div class="empty-state"><h3>Nothing found</h3></div>`;
    return;
  }
  list.forEach(a => g.appendChild(buildCard(a)));
}

// ── HOME — LIVE FROM JIKAN ──
async function loadHome() {
  // Fetch all 3 sections in parallel
  const [seasonal, trending, toprated] = await Promise.all([
    fetchJSON(`${JIKAN}/seasons/now?limit=12`),
    fetchJSON(`${JIKAN}/top/anime?filter=airing&limit=12`),
    fetchJSON(`${JIKAN}/top/anime?limit=12`)
  ]);

  renderGrid('new-grid',      seasonal?.data || []);
  renderGrid('trending-grid', trending?.data  || []);
  renderGrid('toprated-grid', toprated?.data  || []);
}

// ── SEARCH — LIVE FROM JIKAN ──
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  prevPage = document.querySelector('.page.active')?.id || 'home-page';
  showPage('search-results-page');
  document.getElementById('results-title').textContent = `Results for "${q}"`;
  const grid = document.getElementById('results-grid');
  grid.innerHTML = '<div class="loader"><div class="spinner"></div> Searching...</div>';

  const data = await fetchJSON(`${JIKAN}/anime?q=${encodeURIComponent(q)}&limit=24&sfw=true`);
  renderGrid('results-grid', data?.data);
}

document.getElementById('search-btn').onclick = doSearch;
document.getElementById('search-input').onkeydown = e => { if (e.key === 'Enter') doSearch(); };

// ── DETAIL ──
function openDetail(a) {
  currentAnime = a;
  showPage('detail-page');

  const img = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || a.img || '';
  document.getElementById('detail-img').src = img;
  document.getElementById('detail-title').textContent = a.title;
  document.getElementById('detail-synopsis').textContent = a.synopsis || a.synopsis || 'No synopsis available.';

  const tags = [
    { label: a.type || 'TV',         hi: false },
    { label: a.status || '',          hi: a.status === 'Currently Airing' },
    { label: a.year ? String(a.year) : '', hi: false },
    { label: a.score ? `⭐ ${a.score}` : '', hi: true },
    { label: a.episodes ? `${a.episodes} Episodes` : 'Ongoing', hi: false },
  ].filter(t => t.label);

  document.getElementById('detail-meta').innerHTML =
    tags.map(t => `<span class="meta-tag ${t.hi ? 'hi' : ''}">${t.label}</span>`).join('');

  setLang('sub');
  totalEps = a.episodes || 100;

  const eg = document.getElementById('ep-grid');
  eg.innerHTML = '';
  const max = Math.min(totalEps, 500);
  for (let i = 1; i <= max; i++) {
    const b = document.createElement('button');
    b.className = 'ep-btn';
    b.textContent = `EP ${i}`;
    b.onclick = () => openPlayer(i);
    eg.appendChild(b);
  }

  document.getElementById('ep-label').textContent =
    a.episodes ? 'EPISODES' : 'EPISODES (Ongoing — more added as they air)';
  document.getElementById('watch-ep1-btn').onclick = () => openPlayer(1);
}

// ── PLAYER ──
function openPlayer(ep) {
  currentEp = ep;
  showPage('player-page');

  document.getElementById('player-title').innerHTML =
    `${currentAnime.title} <span>— EP ${ep}</span>`;

  document.getElementById('psub').classList.toggle('active', currentLang === 'sub');
  document.getElementById('pdub').classList.toggle('active', currentLang === 'dub');

  document.getElementById('player-iframe').src =
    streamUrl(currentAnime.mal_id, ep, currentLang);

  updateEpNav();

  document.querySelectorAll('.ep-btn').forEach((b, i) =>
    b.classList.toggle('active', i + 1 === ep));
}

function updateEpNav() {
  document.getElementById('ep-indicator').textContent = `Episode ${currentEp}`;
  document.getElementById('prev-ep').disabled = currentEp <= 1;
  document.getElementById('next-ep').disabled = currentEp >= totalEps;
}

document.getElementById('prev-ep').onclick = () => { if (currentEp > 1) openPlayer(currentEp - 1); };
document.getElementById('next-ep').onclick = () => { if (currentEp < totalEps) openPlayer(currentEp + 1); };

document.getElementById('back-detail').onclick = () => {
  document.getElementById('player-iframe').src = '';
  showPage('detail-page');
};

document.getElementById('back-from-detail').onclick = () => {
  showPage(prevPage || 'home-page');
};

// ── INIT ──
loadHome();
</script>
</body>
</html>
