name: PSE Data Scraper

on:
  schedule:
    # PSE trading hours: 9:30 AM - 3:30/4:30 PM Manila time (UTC+8)
    # Manila is UTC+8, so 9:15 AM-4:00 PM MNL = 01:15-08:00 UTC.
    # Runs every 15 minutes across that window, Mon-Fri only.
    # Cron is UTC. Minute-hour pairs below cover :00,:15,:30,:45
    # from 01:15 to 08:00 UTC.
    - cron: '15,30,45 1 * * 1-5'
    - cron: '0,15,30,45 2-7 * * 1-5'
    - cron: '0 8 * * 1-5'
  workflow_dispatch: {} # allows manual trigger from the Actions tab for testing

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run PSE scraper
        working-directory: pse-scraper
        run: node scrape_pse.js
        env:
          PSE_OUTPUT_PATH: ${{ github.workspace }}/pse-history.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pse-history.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update PSE price data [automated]"
          git push
