name: PCSO Results Scraper

on:
  schedule:
    - cron: '15 6 * * *'
    - cron: '15 9 * * *'
    - cron: '45 13 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pytz PCSOLotto-Webscraper

      - name: Run PCSO scraper
        run: python3 .github/scripts/scrape_pcso.py

      - name: Commit results
        run: |
          git config user.name "PCSO Bot"
          git config user.email "pcso-bot@jomerpb.com"
          git add pcso-results.json
          git diff --staged --quiet || git commit -m "Auto-update PCSO results $(date +'%Y-%m-%d %H:%M') PHT"
          git push
