name: PSE Full Market Scraper

on:
  schedule:
    # Once daily, shortly after PSE market close (4:00 PM Manila = 08:00 UTC).
    # Runs at 08:30 UTC (4:30 PM Manila) to give the last blue-chip run
    # a clean head start and avoid overlapping with it.
    - cron: '30 8 * * 1-5'
  workflow_dispatch: {} # manual trigger from the Actions tab, any time

permissions:
  contents: write

env:
  SHARD_COUNT: 4

jobs:
  scrape-shard:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one shard failing shouldn't cancel the others
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run shard ${{ matrix.shard }}
        working-directory: pse-scraper-full
        run: node scrape_pse_full.js
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_COUNT: ${{ env.SHARD_COUNT }}
          PSE_OUTPUT_PATH: ${{ github.workspace }}/pse-scraper-full/pse-full-shard-${{ matrix.shard }}.json

      - name: Upload shard output
        uses: actions/upload-artifact@v4
        with:
          name: pse-full-shard-${{ matrix.shard }}
          path: pse-scraper-full/pse-full-shard-${{ matrix.shard }}.json
          retention-days: 1

  merge-and-commit:
    needs: scrape-shard
    runs-on: ubuntu-latest
    if: always() # still attempt merge even if one shard failed — partial data is still useful
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pse-full-shard-*
          path: shard-downloads
          merge-multiple: true

      - name: Merge shards
        working-directory: pse-scraper-full
        run: node merge_shards.js ${{ github.workspace }}/shard-downloads ${{ github.workspace }}/pse-full-history.json ${{ env.SHARD_COUNT }}

      - name: Commit merged data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pse-full-history.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update full-market PSE data [automated]"
          git push
